# Dev also uses the Neon/Postgres datasource. Provide SPRING_DATASOURCE_URL,
# DATABASE_URL, JDBC_DATABASE_URL, or PGHOST/PGDATABASE/PGUSER/PGPASSWORD.

# Use the live LLM in dev by default. Set QUIZ_AI_LLM_MOCK_ENABLED=true only for local/offline testing.
quiz-ai.llm.mock-enabled=${QUIZ_AI_LLM_MOCK_ENABLED:false}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true