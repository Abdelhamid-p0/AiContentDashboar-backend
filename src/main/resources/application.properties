spring.application.name=ai

spring.datasource.url=${NEON_JDBC_URL}
spring.datasource.username=${NEON_USERNAME}
spring.datasource.password=${NEON_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

quiz-ai.llm.base-url=${QUIZ_AI_LLM_BASE_URL:https://api.groq.com/openai/v1}
quiz-ai.llm.api-key=${GROQ_API_KEY}
quiz-ai.llm.model=${GROQ_MODEL:openai/gpt-oss-120b}
quiz-ai.llm.timeout=30s