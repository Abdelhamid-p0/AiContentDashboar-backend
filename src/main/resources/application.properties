spring.application.name=ai
spring.profiles.active=dev
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]
quiz-ai.llm.base-url=${QUIZ_AI_LLM_BASE_URL:https://api.groq.com/openai/v1}
quiz-ai.llm.api-key=${GROQ_API_KEY:}
quiz-ai.llm.model=${GROQ_MODEL:openai/gpt-oss-120b}
quiz-ai.llm.timeout=30s
